name: test
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install icarus
        run: |
          sudo apt-get update && sudo apt-get install -y iverilog

      - name: Setup Swim
        run: |
          wget https://gitlab.com/api/v4/projects/33589000/jobs/artifacts/main/download?job=build:static -O swim.zip
          unzip swim.zip

      - name: Run tests
        run: |
          ./swim test

      - name: upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            build/**/*.fst
